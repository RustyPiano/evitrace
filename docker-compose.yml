name: evitrace

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATA_ROOT: /app/data
      DATABASE_URL: sqlite:////app/data/app.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
