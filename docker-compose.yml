name: evitrace

services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-EviTrace}
      ENV: ${ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-8}
      DATA_ROOT: /app/data
      DATABASE_URL: sqlite:////app/data/app.db
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-200}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:8000,http://127.0.0.1:8000}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-qwen-local}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-}
      LLM_TIMEOUT_SEC: ${LLM_TIMEOUT_SEC:-180}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      MEDIA_TIMEOUT_SEC: ${MEDIA_TIMEOUT_SEC:-180}
      # The provided backend image is MOCK-only: keep this true unless you build
      # a custom image with ffmpeg/local models, or point OCR/ASR to HTTP services.
      MOCK_AI: ${MOCK_AI:-true}
      MOCK_LLM: ${MOCK_LLM:-}
      MOCK_MEDIA: ${MOCK_MEDIA:-}
      MOCK_VISION: ${MOCK_VISION:-}
      OCR_BASE_URL: ${OCR_BASE_URL:-}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      OCR_MODEL_DIR: ${OCR_MODEL_DIR:-}
      ASR_MODEL_DIR: ${ASR_MODEL_DIR:-}
      ASR_MODEL_SIZE: ${ASR_MODEL_SIZE:-small}
      FFMPEG_TIMEOUT_SEC: ${FFMPEG_TIMEOUT_SEC:-120}
      VIDEO_FRAME_INTERVAL_SEC: ${VIDEO_FRAME_INTERVAL_SEC:-10}
      TIME_CONFLICT_MINUTES: ${TIME_CONFLICT_MINUTES:-30}
      FIRST_ADMIN_USERNAME: ${FIRST_ADMIN_USERNAME:-admin}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin123456}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      # Liveness only. Real-mode OCR/ASR/video/LLM/VLM readiness needs a custom image/check.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
